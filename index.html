<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網頁工具總覽 · Project Bench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F6F8;
    --surface:#FFFFFF;
    --ink:#16202E;
    --ink-soft:#5C6776;
    --ink-faint:#8B96A4;
    --line:#E4E8ED;
    --line-strong:#D2D8E0;
    --teal:#0E7C86;
    --teal-deep:#0A5A62;
    --teal-soft:#E2F1F2;
    --amber:#CF6326;
    --amber-soft:#FBE9DD;
    --green:#2F8F5B;
    --green-soft:#E2F2E8;
    --blue:#3667C2;
    --blue-soft:#E5ECF9;
    --slate:#6B7686;
    --slate-soft:#EBEEF2;
    --shadow:0 1px 2px rgba(22,32,46,.04), 0 6px 20px rgba(22,32,46,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans TC","Space Grotesk",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* ---- Header ---- */
  header.top{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#FFFFFF 0%,#FBFCFD 100%)}
  .top-inner{padding:28px 0 24px;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:5px;min-width:0}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:600}
  h1{margin:0;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-weight:700;font-size:clamp(24px,4vw,34px);letter-spacing:-.01em;line-height:1.1}
  .version-chip{display:inline-flex;align-items:center;gap:8px;margin-top:3px;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--ink-soft)}
  .version-chip b{color:var(--ink);font-weight:600}
  .dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:500;
    transition:transform .12s ease,background .15s ease;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn svg{width:15px;height:15px;stroke-width:1.9}
  .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn-primary:hover{background:var(--teal-deep)}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
  .btn-ghost:hover{background:var(--slate-soft);color:var(--ink)}

  /* ---- Two-pane layout ---- */
  main{padding:28px 0 80px}
  .layout{display:grid;grid-template-columns:1.05fr .95fr;gap:26px;align-items:start}
  .col-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .col-head h2{margin:0;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:15px;font-weight:600;letter-spacing:-.01em}
  .col-head .count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-faint)}
  .col-head .rule{flex:1;height:1px;background:var(--line)}

  /* ---- Case card (left) ---- */
  .cases{display:flex;flex-direction:column;gap:13px}
  .case{position:relative;display:flex;gap:14px;align-items:flex-start;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px 18px;cursor:pointer;
    box-shadow:var(--shadow);overflow:hidden;transition:transform .12s ease,box-shadow .15s ease,border-color .15s ease}
  .case::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tc,var(--teal))}
  .case:hover{transform:translateY(-2px);box-shadow:0 3px 6px rgba(22,32,46,.06),0 14px 32px rgba(22,32,46,.10)}
  .case:hover .open-ind{opacity:1;transform:translate(0,0)}
  .case.selected{border-color:var(--tc,var(--teal));box-shadow:0 0 0 3px color-mix(in srgb,var(--tc,var(--teal)) 16%,transparent),var(--shadow)}
  .mono-tile{flex:none;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:600;letter-spacing:.02em;
    color:var(--tc,var(--teal));background:color-mix(in srgb,var(--tc,var(--teal)) 13%,#fff)}
  .case-body{flex:1;min-width:0}
  .case .code{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint)}
  .case h3{margin:1px 0 0;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:16.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25}
  .case .desc{color:var(--ink-soft);font-size:13px;margin:6px 0 0;line-height:1.5}
  .case-foot{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:11px}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px}
  .status-pill .led{width:7px;height:7px;border-radius:50%}
  .ver{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:500;background:var(--slate-soft);color:var(--ink);padding:3px 8px;border-radius:6px}
  .note-badge{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;
    color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);padding:3px 9px;border-radius:20px;transition:background .15s,color .15s,border-color .15s}
  .note-badge:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-soft)}
  .note-badge svg{width:12px;height:12px;stroke-width:2}
  .note-badge.has{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 35%,var(--line))}
  .open-ind{position:absolute;top:13px;right:14px;width:22px;height:22px;color:var(--tc,var(--teal));
    opacity:0;transform:translate(-2px,2px);transition:opacity .15s,transform .15s}
  .open-ind svg{width:18px;height:18px;stroke-width:2}
  .edit-mini{position:absolute;bottom:12px;right:12px;width:24px;height:24px;border-radius:7px;display:none;
    align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);color:var(--ink-faint)}
  .case:hover .edit-mini{display:inline-flex}
  .edit-mini:hover{color:var(--ink);border-color:var(--line-strong)}
  .edit-mini svg{width:13px;height:13px;stroke-width:1.9}

  .add-case{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--line-strong);
    background:transparent;border-radius:var(--radius);padding:14px;color:var(--ink-soft);font-size:14px;cursor:pointer;
    transition:border-color .15s,color .15s,background .15s}
  .add-case:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-soft)}
  .add-case svg{width:18px;height:18px;stroke-width:1.8}

  /* ---- Notes panel (right) ---- */
  .notepanel{position:sticky;top:22px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .np-head{padding:18px 20px;border-bottom:1px solid var(--line);position:relative}
  .np-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tc,var(--teal))}
  .np-eyebrow{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .np-title{display:flex;align-items:center;gap:10px;margin-top:5px}
  .np-title h3{margin:0;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:18px;font-weight:600;color:var(--tc,var(--ink));letter-spacing:-.01em}
  .np-open{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--tc,var(--teal));text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:7px;border:1px solid color-mix(in srgb,var(--tc,var(--teal)) 30%,var(--line))}
  .np-open:hover{background:color-mix(in srgb,var(--tc,var(--teal)) 10%,#fff)}
  .np-open svg{width:12px;height:12px;stroke-width:2}
  .np-meta{font-size:12px;color:var(--ink-faint);margin-top:6px}

  .np-body{padding:14px 20px 6px;max-height:min(58vh,560px);overflow:auto}
  .note{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:14px;line-height:1.55;border-bottom:1px solid var(--paper)}
  .note:last-child{border-bottom:none}
  .note .chk{flex:none;margin-top:2px;width:17px;height:17px;border-radius:5px;border:1.7px solid var(--line-strong);background:var(--surface);
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
  .note .chk svg{width:11px;height:11px;stroke:#fff;stroke-width:3;opacity:0}
  .note.done .chk{background:var(--green);border-color:var(--green)}
  .note.done .chk svg{opacity:1}
  .note.done .ntext{color:var(--ink-faint);text-decoration:line-through}
  .note .ntext{flex:1;cursor:text;word-break:break-word}
  .note .ndel{flex:none;opacity:0;color:var(--ink-faint);background:none;font-size:16px;line-height:1;padding:2px 5px;border-radius:5px;transition:opacity .15s,color .15s}
  .note:hover .ndel{opacity:1}
  .note .ndel:hover{color:var(--amber)}
  .np-empty{padding:42px 24px;text-align:center;color:var(--ink-faint);font-size:13.5px}
  .np-empty .big{font-size:26px;margin-bottom:8px;opacity:.5}

  .np-add{display:flex;gap:8px;padding:12px 20px 18px;border-top:1px solid var(--line);background:#FCFDFE}
  .np-add input{flex:1;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink)}
  .np-add input:focus{outline:none;border-color:var(--tc,var(--teal));box-shadow:0 0 0 3px color-mix(in srgb,var(--tc,var(--teal)) 18%,transparent)}
  .np-add button{padding:9px 14px;border-radius:9px;background:var(--tc,var(--teal));color:#fff;font-size:13.5px;font-weight:500}
  .np-add button:hover{filter:brightness(.94)}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(22,32,46,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:18px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(22,32,46,.28);overflow:hidden;animation:pop .18s ease}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{margin:0;font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-size:18px;font-weight:600}
  .modal-body{padding:18px 24px 24px;display:grid;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12.5px;color:var(--ink-soft);font-weight:500}
  .field input,.field select,.field textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--paper);color:var(--ink);width:100%}
  .field textarea{resize:vertical;min-height:56px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-soft)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .color-row{display:flex;align-items:center;gap:12px}
  .color-row input[type=color]{width:48px;height:38px;padding:3px;cursor:pointer}
  .swatches{display:flex;gap:7px}
  .sw{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--line-strong)}
  .sw:hover{transform:scale(1.1)}
  .modal-foot{display:flex;justify-content:space-between;gap:10px;padding:0 24px 22px;align-items:center}

  .hint{font-size:12px;color:var(--ink-faint);text-align:center;padding:26px 0 0}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:11px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:860px){
    .layout{grid-template-columns:1fr}
    .notepanel{position:static}
    .np-body{max-height:none}
  }
  @media (max-width:560px){.wrap{padding:0 16px}.row2{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>

<header class="top">
  <div class="wrap top-inner">
    <div class="brand">
      <span class="eyebrow">Web Tooling · chiuchangru.github.io</span>
      <h1>網頁工具總覽</h1>
      <span class="version-chip"><span class="dot-live"></span>目前版本　<b id="snapTag">—</b></span>
    </div>
    <div class="toolbar">
      <button class="btn btn-ghost" id="importBtn" title="從 JSON 還原">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>匯入
      </button>
      <button class="btn" id="exportJsonBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>下載目前版本
      </button>
      <button class="btn btn-primary" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增工具
      </button>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="layout">
    <section>
      <div class="col-head"><h2>案件</h2><span class="count" id="caseCount"></span><span class="rule"></span></div>
      <div class="cases" id="cases"></div>
    </section>
    <section>
      <div class="col-head"><h2>Note</h2><span class="count" id="noteCount"></span><span class="rule"></span></div>
      <div class="notepanel" id="notepanel"></div>
    </section>
  </div>
  <div class="hint" id="storeHint"></div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head"><h3 id="modalTitle">新增工具</h3>
      <button class="btn-ghost" id="modalClose" aria-label="關閉" style="padding:4px;border-radius:8px">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field"><label>工具名稱</label><input id="f_name" placeholder="例：LitDB"></div>
      <div class="row2">
        <div class="field"><label>代碼 / 編號</label><input id="f_code" class="mono" placeholder="litdb"></div>
        <div class="field"><label>版本</label><input id="f_ver" class="mono" placeholder="v1.0"></div>
      </div>
      <div class="field"><label>網站連結（點卡片會開啟）</label><input id="f_url" class="mono" placeholder="https://chiuchangru.github.io/litdb/"></div>
      <div class="row2">
        <div class="field"><label>狀態</label>
          <select id="f_status"><option>規劃中</option><option>開發中</option><option>進行中</option><option>維護中</option><option>已完成</option></select>
        </div>
        <div class="field"><label>Repo（選填）</label><input id="f_repo" class="mono" placeholder="ChiuChangRu/litdb"></div>
      </div>
      <div class="field"><label>主題色（配合該網站風格）</label>
        <div class="color-row">
          <input type="color" id="f_theme" value="#0E7C86">
          <div class="swatches" id="swatches"></div>
        </div>
      </div>
      <div class="field"><label>描述</label><textarea id="f_desc" placeholder="一句話說明這個工具在做什麼"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="deleteBtn" style="color:var(--amber)">刪除工具</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">儲存</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/json" style="display:none">
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const STORE_KEY="web_tools_hub_v2";
  const STATUS={
    "規劃中":{c:"var(--slate)",bg:"var(--slate-soft)"},
    "開發中":{c:"var(--blue)",bg:"var(--blue-soft)"},
    "進行中":{c:"var(--teal)",bg:"var(--teal-soft)"},
    "維護中":{c:"var(--amber)",bg:"var(--amber-soft)"},
    "已完成":{c:"var(--green)",bg:"var(--green-soft)"}
  };
  const SWATCHES=["#E0791F","#D8531F","#2E8B7A","#3F6BC4","#0E7C86","#8E44AD","#C0392B","#16202E"];

  let state=load();
  let editingId=null;
  let selectedId=(state.projects[0]||{}).id||null;

  function seed(){ try{return JSON.parse(document.getElementById("seed-data").textContent)}catch(e){return{projects:[]}} }
  function load(){ try{const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r)}catch(e){} return seed(); }
  let storeOk=(function(){try{localStorage.setItem("_t","1");localStorage.removeItem("_t");return true}catch(e){return false}})();
  function save(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){} markSnap(); }

  const uid=()=>"x"+Math.random().toString(36).slice(2,9);
  const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const $=id=>document.getElementById(id);
  const monogram=p=>((p.code||p.name||"").replace(/[^a-z0-9]/gi,"").slice(0,3)||"?").toUpperCase();

  function markSnap(){
    const d=new Date(),pad=n=>String(n).padStart(2,"0");
    $("snapTag").textContent=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} · ${state.projects.length} 個工具`;
  }

  // ---------- render ----------
  function render(){
    if(!state.projects.some(p=>p.id===selectedId)) selectedId=(state.projects[0]||{}).id||null;
    renderCases(); renderNotes(); markSnap();
    $("caseCount").textContent=state.projects.length;
    $("storeHint").textContent=storeOk
      ? "資料自動存於這台裝置的瀏覽器。換電腦或留版本時，用「下載目前版本」匯出 JSON；對「下載」按鈕按右鍵可匯出含資料的 HTML。"
      : "此預覽環境無法自動儲存 — 編輯後請按「下載目前版本」匯出，下次用「匯入」載回。";
  }

  function renderCases(){
    const root=$("cases"); root.innerHTML="";
    state.projects.forEach(p=>root.appendChild(caseEl(p)));
    const add=document.createElement("button");
    add.className="add-case";
    add.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增工具`;
    add.onclick=()=>openModal(null);
    root.appendChild(add);
  }

  function caseEl(p){
    const st=STATUS[p.status]||STATUS["規劃中"];
    const open=(p.notes||[]).filter(n=>!n.done).length;
    const el=document.createElement("article");
    el.className="case"+(p.id===selectedId?" selected":"");
    el.style.setProperty("--tc",p.theme||"var(--teal)");
    el.innerHTML=`
      <div class="mono-tile">${esc(monogram(p))}</div>
      <div class="case-body">
        ${p.code?`<div class="code">${esc(p.code)}</div>`:""}
        <h3>${esc(p.name)}</h3>
        ${p.desc?`<p class="desc">${esc(p.desc)}</p>`:""}
        <div class="case-foot">
          <span class="status-pill" style="color:${st.c};background:${st.bg}"><span class="led" style="background:${st.c}"></span>${esc(p.status)}</span>
          ${p.ver?`<span class="ver">${esc(p.ver)}</span>`:""}
          <button class="note-badge${open?" has":""}" title="檢視筆記（不開啟網站）">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            筆記 ${(p.notes||[]).length}${open?` · ${open} 待辦`:""}
          </button>
        </div>
      </div>
      <span class="open-ind"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
      <button class="edit-mini" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>`;

    // whole card: select + open site
    el.addEventListener("click",()=>{
      selectedId=p.id; renderCases(); renderNotes();
      if(p.url){ window.open(p.url,"_blank","noopener"); }
      else { toast("尚未設定網站連結"); }
    });
    // note badge: select only, no open
    el.querySelector(".note-badge").addEventListener("click",e=>{
      e.stopPropagation(); selectedId=p.id; renderCases(); renderNotes();
    });
    // edit
    el.querySelector(".edit-mini").addEventListener("click",e=>{ e.stopPropagation(); openModal(p.id); });
    return el;
  }

  function renderNotes(){
    const panel=$("notepanel");
    const p=state.projects.find(x=>x.id===selectedId);
    if(!p){
      $("noteCount").textContent="";
      panel.innerHTML=`<div class="np-empty"><div class="big">✎</div>選擇左側工具以檢視 / 編輯筆記</div>`;
      return;
    }
    const notes=p.notes||[];
    const open=notes.filter(n=>!n.done).length;
    $("noteCount").textContent=open?`${open} 待辦`:`${notes.length}`;
    panel.style.setProperty("--tc",p.theme||"var(--teal)");
    panel.innerHTML=`
      <div class="np-head">
        <div class="np-eyebrow">待改進 / 筆記</div>
        <div class="np-title">
          <h3>${esc(p.name)}</h3>
          ${p.url?`<a class="np-open" href="${esc(p.url)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>開啟網站</a>`:""}
        </div>
        <div class="np-meta">${notes.length} 則筆記${open?` · ${open} 項未完成`:" · 全部完成"}</div>
      </div>
      <div class="np-body" id="npBody"></div>
      <div class="np-add">
        <input type="text" id="npInput" placeholder="新增一條改進事項…" aria-label="新增改進事項">
        <button id="npAdd">加入</button>
      </div>`;

    const body=$("npBody");
    if(notes.length===0){ body.innerHTML=`<div class="np-empty" style="padding:30px 10px">還沒有筆記，從下方加入第一條。</div>`; }
    else notes.forEach(n=>body.appendChild(noteEl(p,n)));

    const inp=$("npInput");
    const add=()=>{ const t=inp.value.trim(); if(!t)return;
      p.notes=p.notes||[]; p.notes.push({id:uid(),text:t,done:false}); inp.value=""; save(); renderNotes(); renderCases(); $("npInput").focus(); };
    $("npAdd").onclick=add;
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") add(); });
  }

  function noteEl(p,n){
    const row=document.createElement("div");
    row.className="note"+(n.done?" done":"");
    row.innerHTML=`<button class="chk" aria-label="完成切換"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
      <span class="ntext" contenteditable="true" spellcheck="false">${esc(n.text)}</span>
      <button class="ndel" aria-label="刪除">×</button>`;
    row.querySelector(".chk").onclick=()=>{ n.done=!n.done; save(); renderNotes(); renderCases(); };
    const txt=row.querySelector(".ntext");
    txt.addEventListener("blur",()=>{ n.text=txt.textContent.trim()||n.text; txt.textContent=n.text; save(); });
    txt.addEventListener("keydown",e=>{ if(e.key==="Enter"){e.preventDefault();txt.blur();} });
    row.querySelector(".ndel").onclick=()=>{ p.notes=p.notes.filter(x=>x.id!==n.id); save(); renderNotes(); renderCases(); };
    return row;
  }

  // ---------- modal ----------
  const overlay=$("overlay");
  function buildSwatches(){
    const w=$("swatches"); w.innerHTML="";
    SWATCHES.forEach(c=>{ const b=document.createElement("button"); b.className="sw"; b.style.background=c;
      b.title=c; b.onclick=()=>{ $("f_theme").value=c; }; w.appendChild(b); });
  }
  function openModal(id){
    editingId=id;
    const p=id?state.projects.find(x=>x.id===id):null;
    $("modalTitle").textContent=p?"編輯工具":"新增工具";
    $("f_name").value=p?p.name:""; $("f_code").value=p?p.code||"":""; $("f_ver").value=p?p.ver||"":"";
    $("f_url").value=p?p.url||"":""; $("f_repo").value=p?p.repo||"":"";
    $("f_status").value=p?p.status:"開發中"; $("f_theme").value=p&&p.theme?p.theme:"#0E7C86";
    $("f_desc").value=p?p.desc||"":"";
    $("deleteBtn").style.display=p?"inline-flex":"none";
    overlay.classList.add("show"); setTimeout(()=>$("f_name").focus(),50);
  }
  function closeModal(){ overlay.classList.remove("show"); editingId=null; }

  $("saveBtn").onclick=()=>{
    const name=$("f_name").value.trim(); if(!name){ $("f_name").focus(); return; }
    const data={ name, code:$("f_code").value.trim(), ver:$("f_ver").value.trim(), status:$("f_status").value,
      url:$("f_url").value.trim(), repo:$("f_repo").value.trim(), theme:$("f_theme").value, desc:$("f_desc").value.trim() };
    if(editingId){ Object.assign(state.projects.find(x=>x.id===editingId),data); }
    else { const np=Object.assign({id:uid(),notes:[]},data); state.projects.push(np); selectedId=np.id; }
    save(); render(); closeModal(); toast(editingId?"已更新":"已新增工具");
  };
  $("deleteBtn").onclick=()=>{
    if(!editingId)return;
    if(!confirm("確定刪除這個工具？此動作無法復原。"))return;
    state.projects=state.projects.filter(x=>x.id!==editingId);
    save(); render(); closeModal(); toast("已刪除");
  };
  $("addBtn").onclick=()=>openModal(null);
  $("cancelBtn").onclick=closeModal; $("modalClose").onclick=closeModal;
  overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&overlay.classList.contains("show")) closeModal(); });

  // ---------- export / import ----------
  function stamp(){ const d=new Date(),pad=n=>String(n).padStart(2,"0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`; }
  function download(fn,content,type){ const b=new Blob([content],{type}),u=URL.createObjectURL(b),a=document.createElement("a");
    a.href=u; a.download=fn; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

  $("exportJsonBtn").onclick=()=>{ download(`網頁工具總覽_${stamp()}.json`, JSON.stringify(state,null,2), "application/json"); toast("已下載 JSON 版本"); };
  $("exportJsonBtn").addEventListener("contextmenu",e=>{ e.preventDefault(); exportHtml(); });
  function exportHtml(){
    const clone=document.documentElement.cloneNode(true);
    const seed=clone.querySelector("#seed-data"); if(seed) seed.textContent=JSON.stringify(state);
    download(`網頁工具總覽_${stamp()}.html`, "<!DOCTYPE html>\n"+clone.outerHTML, "text/html"); toast("已下載含資料的 HTML 版本");
  }

  $("importBtn").onclick=()=>$("fileInput").click();
  $("fileInput").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d||!Array.isArray(d.projects)) throw 0;
        state=d; selectedId=(state.projects[0]||{}).id||null; save(); render(); toast("已匯入並還原");
      }catch(err){ toast("檔案格式不正確"); } e.target.value=""; };
    r.readAsText(f);
  });

  // ---------- toast ----------
  let tt; function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),2200); }

  buildSwatches();
  render();
})();
</script>
</body>
</html>
